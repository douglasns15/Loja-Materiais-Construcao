name = "nexoloja-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
# nodejs_compat é necessário para o driver `pg` rodar no Worker (item 3 / ADR-005).
compatibility_flags = ["nodejs_compat"]

# Variáveis públicas (não-segredas)
[vars]
SUPABASE_URL = "https://esxssekaflzewibbklpu.supabase.co"

# --- Hyperdrive → Supabase (ADR-005) ---
# Conexão poolada na edge. Recriar com:
#   npx wrangler hyperdrive create nexoloja-db --connection-string="<DIRECT_URL>"
# Cache de leitura DESABILITADO (evita listas velhas após escrita num ERP/POS):
#   npx wrangler hyperdrive update <id> --caching-disabled
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "7b728afad9a643f096bfbcdb6d0724ea"

# --- Cloudflare R2: mídia da loja (ADR-007) ---
# Binding do bucket de mídia. O Worker faz put/get/delete direto (sem chaves S3,
# sem CORS de bucket). Criar o bucket uma única vez com:
#   npx wrangler r2 bucket create nexoloja-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "nexoloja-media"

# --- Desenvolvimento local ---
# Sem Hyperdrive, defina DATABASE_URL em apps/api/.dev.vars (NÃO commitar):
#   DATABASE_URL="postgresql://...:6543/postgres?pgbouncer=true"
